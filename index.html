<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Regiane Favorato</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0e0e0e;
      color: #ffffff;
    }

    header {
      padding: 100px 20px;
      text-align: center;
      background: linear-gradient(180deg, #000000, #1b1c1e);
    }

    h1 {
      font-size: 48px;
      color: #c9a14a;
      margin-bottom: 10px;
    }

    h2 {
      font-weight: normal;
      margin-bottom: 30px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111111;
      border: 1px solid #c9a14a;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
    }

    footer {
      background: #000000;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #999999;
    }
  </style>
</head>

<body>

<header>
  <h1>Regiane Favorato</h1>
  <h2>Coach & Mentoria de Carreira</h2>
  <p>Clareza e direção para decisões profissionais com segurança.</p>
</header>

<div class="container">
  <div class="cards">
    <div class="card">Clareza profissional</div>
    <div class="card">Reposicionamento de carreira</div>
    <div class="card">Tomada de decisão</div>
    <div class="card">Propósito e autoconfiança</div>
  </div>
</div>

<footer>
  © 2026 · Regiane Favorato
</footer>

</body>
</html>
